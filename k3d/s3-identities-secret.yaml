# Custom S3 identity config for the lab, mounted by the s3 gateway via
# `s3.existingConfigSecret` (see k3d/seaweedfs-values.yaml).
#
# SeaweedFS has no MinIO-style isolated "tenants" — instead it uses an IAM-like
# list of identities, each with credentials + actions. Actions are either GLOBAL
# (Admin, Read, Write, List, Tagging) or SCOPED to a bucket as `Action:bucket`.
# We emulate tenants by scoping each tenant identity to a single bucket:
#   - admin    -> global everything
#   - tenant-a -> only bucket-a
#   - tenant-b -> only bucket-b
#   - s3test-main / s3test-alt / s3test-tenant -> full-access users required by
#     the Ceph s3-tests suite (needs 3 distinct users for cross-user/ACL tests).
#
# NOTE: The admin credentials here MUST match the justfile vars
# `s3_access_key` / `s3_secret_key` (they're the same admin identity the other
# recipes use). All credentials are LOCAL-LAB THROWAWAY values.
apiVersion: v1
kind: Secret
metadata:
  name: seaweedfs-s3-identities
  namespace: seaweedfs
type: Opaque
stringData:
  seaweedfs_s3_config: |
    {
      "identities": [
        {
          "name": "admin",
          "credentials": [
            { "accessKey": "seaweedadmin", "secretKey": "lab-secret-change-me" }
          ],
          "actions": ["Admin", "Read", "Write", "List", "Tagging"]
        },
        {
          "name": "tenant-a",
          "credentials": [
            { "accessKey": "tenant-a", "secretKey": "tenant-a-secret-change-me" }
          ],
          "actions": ["Read:bucket-a", "Write:bucket-a", "List:bucket-a", "Tagging:bucket-a"]
        },
        {
          "name": "tenant-b",
          "credentials": [
            { "accessKey": "tenant-b", "secretKey": "tenant-b-secret-change-me" }
          ],
          "actions": ["Read:bucket-b", "Write:bucket-b", "List:bucket-b", "Tagging:bucket-b"]
        },
        {
          "name": "s3test-main",
          "credentials": [
            { "accessKey": "s3test-main", "secretKey": "s3test-main-secret" }
          ],
          "actions": ["Admin", "Read", "Write", "List", "Tagging"]
        },
        {
          "name": "s3test-alt",
          "credentials": [
            { "accessKey": "s3test-alt", "secretKey": "s3test-alt-secret" }
          ],
          "actions": ["Admin", "Read", "Write", "List", "Tagging"]
        },
        {
          "name": "s3test-tenant",
          "credentials": [
            { "accessKey": "s3test-tenant", "secretKey": "s3test-tenant-secret" }
          ],
          "actions": ["Admin", "Read", "Write", "List", "Tagging"]
        }
      ]
    }
