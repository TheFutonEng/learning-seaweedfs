# Ceph s3-tests config for the SeaweedFS lab.
# Mounted into the s3-tests container and referenced via S3TEST_CONF.
# The endpoint is reached via `kubectl port-forward` (localhost:8333).
# All credentials are LOCAL-LAB THROWAWAY values and must match the
# s3test-* identities in k3d/s3-identities-secret.yaml.

[DEFAULT]
host = localhost
port = 8333
is_secure = False
ssl_verify = False

[fixtures]
bucket prefix = s3tests-{random}-

[s3 main]
display_name = s3test-main
user_id = s3test-main
email = main@lab.local
api_name = default
access_key = s3test-main
secret_key = s3test-main-secret

[s3 alt]
display_name = s3test-alt
user_id = s3test-alt
email = alt@lab.local
access_key = s3test-alt
secret_key = s3test-alt-secret

[s3 tenant]
display_name = s3test-tenant
user_id = s3test-tenant
email = tenant@lab.local
access_key = s3test-tenant
secret_key = s3test-tenant-secret
tenant = testtenant

[iam]
# Root user for IAM-related tests (reuse the main admin identity).
email = iam@lab.local
user_id = s3test-main
access_key = s3test-main
secret_key = s3test-main-secret
display_name = s3test-main

# The suite reads these sections at collection time even though SeaweedFS has no
# IAM-account support — the tests that use them will error/fail at runtime, which
# is an expected/known gap.
[iam root]
access_key = s3test-main
secret_key = s3test-main-secret
account_id = RGW11111111111111111
user_id = RGW11111111111111111
email = root1@lab.local

[iam alt root]
access_key = s3test-alt
secret_key = s3test-alt-secret
account_id = RGW22222222222222222
user_id = RGW22222222222222222
email = root2@lab.local
